<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Board — DIA</title>

  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Favicons -->
<link rel="icon" href="assets/favicons/favicon-light.png">

<link rel="icon" type="image/png" sizes="32x32"
      href="assets/favicons/favicon-light-32.png"
      media="(prefers-color-scheme: light)">

<link rel="icon" type="image/png" sizes="16x16"
      href="assets/favicons/favicon-light-16.png"
      media="(prefers-color-scheme: light)">

<link rel="icon" type="image/png" sizes="32x32"
      href="assets/favicons/favicon-dark-32.png"
      media="(prefers-color-scheme: dark)">

<link rel="icon" type="image/png" sizes="16x16"
      href="assets/favicons/favicon-dark-16.png"
      media="(prefers-color-scheme: dark)">

<link rel="apple-touch-icon" sizes="180x180"
      href="assets/favicons/apple-touch-icon.png">

</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- MENU -->
  <div id="menu-placeholder"></div>

  <!-- HERO -->
  <section class="page-hero">
    <div class="page-hero-inner">
      <h1>Join the Board</h1>
      <p>
        Contribute to the development of the DIA and help shape an international academic initiative.
      </p>
    </div>
  </section>

  <!-- CONTENT -->
  <section class="info">
    <div class="info-inner">

      <p>
        To apply, please include in your email:
      </p>

      <ul style="margin-top:15px; line-height:1.8;">
        <li>Your name</li>
        <li>Your university</li>
        <li>A cover letter</li>
        <li>Optional: your CV</li>
      </ul>

      <div style="margin-top:40px;">
        <a href="mailto:applications@dubyinternational.org?subject=Board Application - DIA"
           class="btn-primary big">
           Apply to Join the Board
        </a>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="script.js"></script>
  <script src="menu.js"></script>

</body>
</html>
